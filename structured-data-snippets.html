        },
        {
          "@type": "Question",
          "name": "医薬部外品とは何ですか？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "厚生労働省が有効成分の効能・効果を認可した製品区分です。一般の化粧品と異なり、配合された有効成分が頭皮・毛髪への薬理作用を持つことが認められています。UP&UPの全商品は医薬部外品です。"
          }

          "@type": "Question",
          "name": "感光素301号とはどんな成分ですか？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "光に反応して作用する色素（フォトセンシタイザー）の一種で、毛髪サイクルのさまざまなステップに働きかけて発毛を促進し、脱毛を予防する有効成分です。安全性が高く、長年育毛剤に使用されています。UP&UPヘアレストリングローションに配合されています。"
          }
        },
        {
          "@type": "Question",
          "name": "ピロクトンオラミンとはどんな成分ですか？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "フケ・かゆみの主な原因とされる真菌（マラセチア菌）の増殖を抑える抗真菌性の有効成分です。UP&UPスカルプシャンプーとマイルドコンディショナーの両方に配合されています。"

          }

        {
          "@type": "Question",

          }
        },

          "@type": "Question",

          }

            "text": "スカルプシャンプーは年齢・性別を問わず使用できる設計です。妊娠中・授乳中の方は念のためかかりつけ医にご相談ください。"
